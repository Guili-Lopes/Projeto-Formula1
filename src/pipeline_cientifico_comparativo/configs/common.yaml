schema_version: "1.0"

project:
  name: Projeto Formula 1
  pipeline: pipeline_cientifico_comparativo

paths:
  data_dir: data
  artifact_root: artifacts/pipeline_cientifico_comparativo

experiment:
  random_seed: 42

# Divisão temporal oficial do estudo comparativo.
data:
  train_years: [2019, 2020, 2021, 2022, 2023]
  validation_years: [2024]
  test_years: [2025]
  top_k: 10

mallows:
  n_clusters: 2
  n_iterations: 150
  refit_iterations: 150
  alpha: 0.5

plackett_luce:
  n_iterations: 200

prediction:
  cluster_weight: 0.7
  min_cluster_size: 5

simulation:
  n_simulations: 10000
  n_positions: 20
  seed_strategy: stable_per_race
  # Preserva o comportamento probabilístico do Pipeline 3 atual.
  score_source: cluster

artifacts:
  schema_version: "1.0"
  save_model: true
  save_notebook_bundle: true
  csv_mirrors: true
  parquet_required: true

runtime:
  verbose: true
  include_torch_seed: false

# 2025 permanece bloqueado durante desenvolvimento. Além deste campo, o CLI
# exige a flag explícita --unlock-final-test.
development:
  test_years_locked: true

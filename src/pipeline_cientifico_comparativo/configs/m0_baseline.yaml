experiment:
  model_id: M0
  name: M0 - Mallows + Plackett-Luce original
  phase: 0
  description: >-
    Baseline científico reproduzível. Usa os modelos Mallows e Plackett-Luce
    atuais, atualização incremental, Monte Carlo, métricas de ranking e RPS.

model:
  mallows_enabled: true
  plackett_luce_variant: baseline
  driver_effect: true
  team_effect: false
  dnf_model: none
  feature_model: none
  optimizer: mm
  openf1_as_predictor: false

reference_validation:
  # Referência arredondada da execução atual do Pipeline 3. Como o M0 científico
  # não carrega 2025 durante a validação, o RPS é uma referência aproximada.
  expected_races: 24
  metrics:
    mean_top3: 0.347
    mean_top5: 0.575
    mean_kendall: 0.400
    mean_rps_model: 0.1270
    mean_rps_baseline: 0.1762
    mean_gain: 0.0492
  tolerances:
    deterministic: 0.001
    probabilistic: 0.010
  fail_on_mismatch: false

[pytest]
testpaths = tests
addopts = -q -m "not slow"
markers =
    slow: execuções completas de pipeline (rodar com: pytest -m slow)
    data_quality: verificações sobre os dados reais versionados no repositório
    e2e: execuções ponta a ponta com dados sintéticos reduzidos
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
